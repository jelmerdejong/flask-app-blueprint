{% extends "_base.html" %}
{% block title %}Dashboard{% endblock %}
{% block content %}

<div class="content-panel p-4 p-lg-5">
    <h2 class="h4 mb-4">My Items</h2>
    {% if not items %}
    <p class="mb-0">No items are added yet. <a href="{{ url_for('items.add_item') }}">Add a new item</a>.</p>
    {% else %}
    <div class="table-responsive">
    <table class="table table-striped align-middle">
      <thead>
        <tr>
          <th>Name</th>
          <th>Notes</th>
        </tr>
      </thead>
      <tbody>
        {% for item in items %}
        <tr>
          <td>{{ item.name }}</td>
          <td>{{ item.notes }}</td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
    </div>
    {% endif %}
</div>

{% endblock %}

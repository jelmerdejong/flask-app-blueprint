{% extends "_base.html" %}
{% block title %}All Items{% endblock %}
{% block content %}

{% if not items %}
<div class="content-panel p-4">
  <p class="mb-0">No items are added yet. <a href="{{ url_for('items.add_item') }}">Add a new item</a>.</p>
</div>
{% else %}
<div class="content-panel overflow-hidden">
  <div class="table-responsive">
    <table class="table table-striped align-middle">
      <thead>
        <tr>
          <th>Name</th>
          <th>Notes</th>
          <th class="text-end">Actions</th>
        </tr>
      </thead>
      <tbody>
        {% for item in items %}
        <tr>
          <td>{{ item.name }}</td>
          <td>{{ item.notes }}</td>
          <td class="text-end">
            <div class="d-flex flex-wrap justify-content-end gap-2">
              <a href="{{ url_for('items.edit_item', items_id=item.id) }}" class="btn btn-sm btn-outline-primary">Edit</a>
              <form action="{{ url_for('items.delete_item', items_id=item.id) }}" method="post">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                <button type="submit" class="btn btn-sm btn-outline-danger">Delete</button>
              </form>
            </div>
          </td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
</div>
{% endif %}

{% endblock %}

version: 2
jobs:
  build:
    docker:
      - image: cimg/python:3.11

    working_directory: ~/repo

    steps:
      - checkout

      - restore_cache:
          keys:
          - v2-uv-{{ checksum "uv.lock" }}
          - v2-uv-

      - run:
          name: install uv
          command: |
            python3 -m pip install uv

      - run:
          name: sync dependencies
          command: |
            uv sync --locked

      - save_cache:
          paths:
            - ./.venv
          key: v2-uv-{{ checksum "uv.lock" }}

      - run:
          name: run migrations and tests
          command: |
            export DATABASE_URL=sqlite:////tmp/flask-app-blueprint-ci.db
            uv run flask db upgrade
            uv run python -m unittest discover -s project/tests -v
